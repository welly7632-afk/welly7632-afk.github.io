<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>語音輸入</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; max-width: 680px; margin: 0 auto; padding: 16px; background: #f5f6f8; color: #222; }
  h1 { font-size: 20px; margin: 8px 0 2px; }
  .hint { color: #888; font-size: 13px; margin-bottom: 12px; }
  #mic { display: block; width: 100%; padding: 18px; font-size: 22px; border: 0; border-radius: 14px; cursor: pointer; background: #2f7d4f; color: #fff; transition: background .15s; }
  #mic.on { background: #c0392b; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,.45); } 50% { box-shadow: 0 0 0 12px rgba(192,57,43,0); } }
  #interim { min-height: 24px; color: #999; font-size: 16px; padding: 8px 2px; }
  #text { width: 100%; height: 42vh; font-size: 18px; line-height: 1.7; padding: 12px; border: 1px solid #ddd; border-radius: 12px; resize: vertical; }
  .row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .row button { flex: 1; min-width: 70px; padding: 12px 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 10px; background: #fff; cursor: pointer; }
  .row button:active { background: #eee; }
  #copy { background: #2b6cb0; color: #fff; border-color: #2b6cb0; flex: 2; }
  .punc { flex: 0 0 52px !important; min-width: 52px !important; }
  #status { text-align: center; color: #c0392b; font-size: 14px; min-height: 20px; margin-top: 8px; }
</style>
</head>
<body>
  <h1>🎤 語音輸入(中文/台灣)</h1>
  <div class="hint">按綠色鈕開始講,再按一次停止。講完按「複製」貼到任何地方。需用 Chrome 或 Edge、允許麥克風。</div>
  <button id="mic">🎙️ 開始語音輸入</button>
  <div id="interim"></div>
  <textarea id="text" placeholder="辨識結果會出現在這裡,可以直接編輯…"></textarea>
  <div class="row">
    <button class="punc" data-p=",">,</button>
    <button class="punc" data-p="。">。</button>
    <button class="punc" data-p="?">?</button>
    <button class="punc" data-p="!">!</button>
    <button class="punc" data-p="&#10;">⏎</button>
  </div>
  <div class="row">
    <button id="copy">📋 複製全部</button>
    <button id="clear">🗑️ 清除</button>
  </div>
  <div id="status"></div>

<script>
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const mic = document.getElementById('mic');
  const text = document.getElementById('text');
  const interim = document.getElementById('interim');
  const status = document.getElementById('status');
  let rec = null, active = false;

  if (!SR) {
    mic.disabled = true;
    status.textContent = '這個瀏覽器不支援語音辨識,請改用 Chrome 或 Edge。';
  }

  function makeRec() {
    const r = new SR();
    r.lang = 'zh-TW';
    r.continuous = true;
    r.interimResults = true;
    r.onresult = e => {
      let tmp = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) { insert(t); } else { tmp += t; }
      }
      interim.textContent = tmp;
    };
    r.onerror = e => {
      if (e.error === 'not-allowed') { status.textContent = '麥克風被封鎖:點網址列的 🔒 允許麥克風後重試。'; stop(); }
      else if (e.error === 'no-speech') { /* 靜音逾時,onend 會自動重啟 */ }
      else if (e.error === 'network') { status.textContent = '網路問題,辨識服務連不上,稍後再試。'; stop(); }
    };
    r.onend = () => { if (active) { try { r.start(); } catch (_) {} } }; // 靜音自動續聽
    return r;
  }

  function insert(t) {
    const s = text.selectionStart, e = text.selectionEnd;
    text.value = text.value.slice(0, s) + t + text.value.slice(e);
    text.selectionStart = text.selectionEnd = s + t.length;
    text.scrollTop = text.scrollHeight;
  }

  function start() {
    rec = rec || makeRec();
    try { rec.start(); } catch (_) {}
    active = true;
    mic.classList.add('on');
    mic.textContent = '⏹️ 停止(錄音中…)';
    status.textContent = '';
  }
  function stop() {
    active = false;
    if (rec) try { rec.stop(); } catch (_) {}
    interim.textContent = '';
    mic.classList.remove('on');
    mic.textContent = '🎙️ 開始語音輸入';
  }
  mic.onclick = () => active ? stop() : start();

  document.querySelectorAll('.punc').forEach(b => {
    b.onclick = () => { insert(b.dataset.p); text.focus(); };
  });

  document.getElementById('copy').onclick = async () => {
    if (!text.value) return;
    await navigator.clipboard.writeText(text.value);
    const btn = document.getElementById('copy');
    btn.textContent = '✅ 已複製';
    setTimeout(() => btn.textContent = '📋 複製全部', 1200);
  };
  document.getElementById('clear').onclick = () => { text.value = ''; interim.textContent = ''; text.focus(); };
</script>
</body>
</html>
